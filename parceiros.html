<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIDEL - Parceiros</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; background: #f0f2f5; padding: 20px; margin: 0; }
        .navbar { background: #0055FF; color: white; padding: 12px 20px; display: flex; justify-content: space-between; margin: -20px -20px 20px -20px; }
        .navbar a { color: white; margin-left: 15px; text-decoration: none; }
        input, button { padding: 10px; border-radius: 8px; border: 1px solid #ddd; width: 100%; margin: 5px 0; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .row input { flex: 1; }
        button { background: #0055FF; color: white; font-weight: bold; cursor: pointer; border: none; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; margin-top: 20px; }
        th { background: #0055FF; color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🤝 Parceiros</h1>
        <div>
            <a href="dashboard.html">Dashboard</a>
            <a href="vendas.html">💰 Vender</a>
            <a href="clientes.html">Clientes</a>
        </div>
    </div>
    <div style="background:white;padding:20px;border-radius:10px;margin-bottom:20px">
        <input id="nomeParceiro" placeholder="Nome">
        <input id="idprof" placeholder="CRN/CRM">
        <input id="foneParceiro" placeholder="Telefone">
        <input id="emailParceiro" placeholder="Email">
        <div class="row">
            <input type="number" id="diaParceiro" placeholder="Dia" min="1" max="31">
            <input type="number" id="mesParceiro" placeholder="Mês" min="1" max="12">
        </div>
        <button id="btnCadastrar" onclick="adicionar()">Cadastrar Parceiro</button>
    </div>
    <table><thead><tr><th>Nome</th><th>ID Prof.</th><th>Telefone</th><th>Comissão</th></tr></thead><tbody id="listaParceiros"></tbody></table>
    <script>
        var COMPANY_ID = localStorage.getItem('lidel_company_id') || '428b07fc-0b10-481d-b32f-3d97c9d80ecd';
        var SUPABASE_URL = 'https://uqnxckjhmdkviouoivyy.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxbnhja2pobWRrdmlvdW9pdnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDk4NTAsImV4cCI6MjA5MzE4NTg1MH0.eXz3MU1PCxxQ5Yz0HzWIgqJhdyBAcQfT78rUDGdzVQc';
        var s = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function carregar(){
            var resp = await s.from('partners').select('*').eq('company_id', COMPANY_ID).order('name');
            document.getElementById('listaParceiros').innerHTML = (resp.data||[]).map(function(p) {
                return '<tr><td>' + p.name + '</td><td>' + (p.professional_identifier||'-') + '</td><td>' + p.phone + '</td><td>R$' + (p.cashback_accumulated||0).toFixed(2) + '</td></tr>';
            }).join('');
        }
        async function adicionar(){
            var btn = document.getElementById('btnCadastrar');
            var n = document.getElementById('nomeParceiro').value.trim();
            var f = document.getElementById('foneParceiro').value.trim();
            if(!n||!f) return;
            btn.disabled = true; btn.textContent = 'Salvando…';
            await s.from('partners').insert([{
                company_id:COMPANY_ID, name:n, phone:f,
                professional_identifier:document.getElementById('idprof').value,
                email:document.getElementById('emailParceiro').value,
                birthday_day: parseInt(document.getElementById('diaParceiro').value) || null,
                birthday_month: parseInt(document.getElementById('mesParceiro').value) || null
            }]);
            btn.disabled = false; btn.textContent = 'Cadastrar Parceiro';
            carregar();
        }
        carregar();
    </script>
</body>
</html>
