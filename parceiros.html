<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIDEL - Parceiros</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; background: #f0f2f5; padding: 20px; margin: 0; }
        .navbar { background: #0055FF; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; margin: -20px -20px 20px -20px; }
        .navbar h1 { font-size: 20px; margin: 0; }
        .navbar a { color: white; text-decoration: none; margin-left: 15px; font-size: 14px; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; }
        h2 { color: #0055FF; }
        input, button { padding: 10px; border-radius: 8px; border: 1px solid #ddd; width: 100%; margin: 5px 0; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .row input { flex: 1; }
        button { background: #0055FF; color: white; font-weight: bold; cursor: pointer; border: none; }
        .btn-excluir { background: #dc2626; }
        .btn-editar { background: #f59e0b; color: white; margin-right:5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #0055FF; color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .msg { padding: 10px; border-radius: 5px; margin: 10px 0; display: none; }
        .msg.info { background: #dbeafe; color: #1e40af; display: block; }
        .msg.erro { background: #fee2e2; color: #991b1b; display: block; }
        .msg.sucesso { background: #d1fae5; color: #065f46; display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
        .clickable { cursor: pointer; color: #0055FF; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🤝 Parceiros</h1>
        <div>
            <a href="dashboard.html">Dashboard</a>
            <a href="vendas.html">💰 Vender</a>
            <a href="clientes.html">Clientes</a>
            <a href="aniversariantes.html">🎂 Aniversariantes</a>
        </div>
    </div>
    <div class="container">
        <h2>Cadastro de Parceiro</h2>
        <input type="text" id="nomeParceiro" placeholder="Nome *">
        <input type="text" id="idprof" placeholder="Identificação Profissional">
        <input type="tel" id="foneParceiro" placeholder="Telefone *">
        <input type="email" id="emailParceiro" placeholder="Email">
        <div class="row">
            <input type="number" id="diaParceiro" placeholder="Dia" min="1" max="31">
            <input type="number" id="mesParceiro" placeholder="Mês" min="1" max="12">
        </div>
        <button id="btnCadastrar" onclick="adicionar()">💾 Cadastrar</button>
        <div id="msg" class="msg"></div>
        <h2>Parceiros Cadastrados</h2>
        <input type="text" id="busca" placeholder="🔍 Buscar..." oninput="filtrar()">
        <table>
            <thead><tr><th>Nome</th><th>Identificação</th><th>Telefone</th><th>Comissão Acumulada</th><th>Ações</th></tr></thead>
            <tbody id="listaParceiros"></tbody>
        </table>
    </div>

    <!-- Modal de Histórico ao clicar no nome -->
    <div class="modal" id="modalHistorico">
        <div class="modal-content">
            <h2>Histórico de Indicações</h2>
            <div id="historicoConteudo"></div>
            <button onclick="fecharModalHistorico()" style="background:#ccc;margin-top:15px;">Fechar</button>
        </div>
    </div>

    <!-- Modal de Edição -->
    <div class="modal" id="modalEdicao">
        <div class="modal-content">
            <h2>Editar Parceiro</h2>
            <input type="hidden" id="editId">
            <input type="text" id="editNome" placeholder="Nome">
            <input type="text" id="editIdprof" placeholder="Identificação Profissional">
            <input type="tel" id="editFone" placeholder="Telefone">
            <input type="email" id="editEmail" placeholder="Email">
            <div class="row">
                <input type="number" id="editDia" placeholder="Dia" min="1" max="31">
                <input type="number" id="editMes" placeholder="Mês" min="1" max="12">
            </div>
            <button onclick="salvarEdicao()">💾 Salvar</button>
            <button onclick="fecharModalEdicao()" style="background:#ccc;margin-top:5px;">Cancelar</button>
        </div>
    </div>

    <script>
        var COMPANY_ID = localStorage.getItem('lidel_company_id') || '428b07fc-0b10-481d-b32f-3d97c9d80ecd';
        var SUPABASE_URL = 'https://uqnxckjhmdkviouoivyy.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxbnhja2pobWRrdmlvdW9pdnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDk4NTAsImV4cCI6MjA5MzE4NTg1MH0.eXz3MU1PCxxQ5Yz0HzWIgqJhdyBAcQfT78rUDGdzVQc';
        var s = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        var parceiros = [];

        async function carregar() {
            var resp = await s.from('partners').select('*').eq('company_id', COMPANY_ID).order('name');
            parceiros = resp.data || [];
            render(parceiros);
        }

        function render(lista) {
            document.getElementById('listaParceiros').innerHTML = lista.map(function(p) {
                return `<tr>
                    <td class="clickable" onclick="verHistorico('${p.id}')">${p.name}</td>
                    <td>${p.professional_identifier||'-'}</td>
                    <td>${p.phone}</td>
                    <td style="color:green">R$${(p.cashback_accumulated||0).toFixed(2)}</td>
                    <td>
                        <button class="btn-editar" onclick="editar('${p.id}')">✏️</button>
                        <button class="btn-excluir" onclick="excluir('${p.id}')">🗑️</button>
                    </td></tr>`;
            }).join('');
        }

        function filtrar() {
            var termo = document.getElementById('busca').value.toLowerCase();
            render(parceiros.filter(function(p) { return p.name.toLowerCase().includes(termo) || p.phone.includes(termo); }));
        }

        async function adicionar() {
            var n = document.getElementById('nomeParceiro').value.trim();
            var f = document.getElementById('foneParceiro').value.trim();
            if (!n || !f) { mostrarMsg('Nome e telefone obrigatórios.', 'erro'); return; }
            var btn = document.getElementById('btnCadastrar'); btn.disabled = true; btn.textContent = 'Salvando…';
            var resp = await s.from('partners').insert([{
                company_id: COMPANY_ID, name: n, phone: f,
                professional_identifier: document.getElementById('idprof').value,
                email: document.getElementById('emailParceiro').value,
                birthday_day: parseInt(document.getElementById('diaParceiro').value) || null,
                birthday_month: parseInt(document.getElementById('mesParceiro').value) || null
            }]);
            btn.disabled = false; btn.textContent = '💾 Cadastrar';
            if (resp.error) mostrarMsg(resp.error.message, 'erro');
            else { mostrarMsg('Parceiro cadastrado!', 'sucesso'); limparForm(); carregar(); }
        }

        async function verHistorico(id) {
            var p = parceiros.find(function(x) { return x.id === id; });
            if (!p) return;

            // Buscar vendas indicadas por este parceiro (últimos 3 meses)
            var tresMesesAtras = new Date(); tresMesesAtras.setMonth(tresMesesAtras.getMonth() - 3);
            var respVendas = await s.from('sales')
                .select('sale_date, total_amount, cashback_generated, clients!inner(name)')
                .eq('partner_id', id)
                .gte('sale_date', tresMesesAtras.toISOString().split('T')[0])
                .order('sale_date', { ascending: false });

            var html = `<h3>${p.name}</h3>
                <p><strong>Comissão acumulada:</strong> R$${(p.cashback_accumulated||0).toFixed(2)}</p>
                <h4>📋 Indicações recentes (3 meses)</h4>`;
            if (respVendas.data && respVendas.data.length > 0) {
                html += '<table><tr><th>Data</th><th>Cliente</th><th>Valor</th><th>Comissão (3%)</th></tr>';
                respVendas.data.forEach(function(v) {
                    var comissao = (v.total_amount * 0.03).toFixed(2);
                    html += `<tr><td>${new Date(v.sale_date).toLocaleDateString('pt-BR')}</td><td>${v.clients?.name||'-'}</td><td>R$${v.total_amount.toFixed(2)}</td><td>R$${comissao}</td></tr>`;
                });
                html += '</table>';
            } else html += '<p>Nenhuma indicação recente.</p>';

            document.getElementById('historicoConteudo').innerHTML = html;
            document.getElementById('modalHistorico').classList.add('active');
        }

        function fecharModalHistorico() { document.getElementById('modalHistorico').classList.remove('active'); }

        function editar(id) {
            var p = parceiros.find(function(x) { return x.id === id; });
            if (!p) return;
            document.getElementById('editId').value = p.id;
            document.getElementById('editNome').value = p.name;
            document.getElementById('editIdprof').value = p.professional_identifier || '';
            document.getElementById('editFone').value = p.phone;
            document.getElementById('editEmail').value = p.email || '';
            document.getElementById('editDia').value = p.birthday_day || '';
            document.getElementById('editMes').value = p.birthday_month || '';
            document.getElementById('modalEdicao').classList.add('active');
        }

        function fecharModalEdicao() { document.getElementById('modalEdicao').classList.remove('active'); }

        async function salvarEdicao() {
            var id = document.getElementById('editId').value;
            var nome = document.getElementById('editNome').value.trim();
            var fone = document.getElementById('editFone').value.trim();
            if (!nome || !fone) { alert('Nome e telefone obrigatórios.'); return; }
            var resp = await s.from('partners').update({
                name: nome, phone: fone,
                professional_identifier: document.getElementById('editIdprof').value,
                email: document.getElementById('editEmail').value,
                birthday_day: parseInt(document.getElementById('editDia').value) || null,
                birthday_month: parseInt(document.getElementById('editMes').value) || null
            }).eq('id', id);
            if (resp.error) alert(resp.error.message);
            else { fecharModalEdicao(); carregar(); mostrarMsg('Atualizado!', 'sucesso'); }
        }

        async function excluir(id) {
            if (!confirm('Excluir este parceiro?')) return;
            var resp = await s.from('partners').delete().eq('id', id);
            if (resp.error) alert(resp.error.message);
            else { carregar(); mostrarMsg('Excluído!', 'sucesso'); }
        }

        function mostrarMsg(texto, tipo) {
            var m = document.getElementById('msg');
            m.className = 'msg ' + tipo;
            m.textContent = texto;
        }
        function limparForm() {
            ['nomeParceiro','idprof','foneParceiro','emailParceiro','diaParceiro','mesParceiro'].forEach(function(id) { document.getElementById(id).value = ''; });
        }

        carregar();
    </script>
</body>
</html>
