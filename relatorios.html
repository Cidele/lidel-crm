<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIDEL - Relatórios</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; background: #f0f2f5; margin: 0; padding: 20px; }
        .navbar { background: #0055FF; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; margin: -20px -20px 20px -20px; }
        .navbar h1 { font-size: 20px; margin: 0; }
        .navbar a { color: white; text-decoration: none; margin-left: 15px; font-size: 14px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h2 { color: #0055FF; margin-top: 0; }
        .filters { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
        input, select, button { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        button { background: #0055FF; color: white; font-weight: bold; cursor: pointer; border: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #0055FF; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .total { font-weight: bold; font-size: 16px; }
        .green { color: #065f46; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>📊 Relatórios</h1>
        <div>
            <a href="dashboard.html">Dashboard</a>
            <a href="vendas.html">💰 Vender</a>
            <a href="relatorios.html">Relatórios</a>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <h2>Extrato de Vendas</h2>
            <div class="filters">
                <label>De: <input type="date" id="dataInicio"></label>
                <label>Até: <input type="date" id="dataFim"></label>
                <button onclick="filtrar()">Filtrar</button>
                <button onclick="exportarCSV()">📥 CSV</button>
            </div>
            <table id="tabelaVendas">
                <thead><tr><th>Data</th><th>Cliente</th><th>Valor Total</th><th>Valor Pago</th><th>Cashback Gerado</th></tr></thead>
                <tbody></tbody>
            </table>
            <div class="total" style="margin-top:15px;">
                Total no período: <span id="totalVendas">R$ 0,00</span> |
                Cashback total: <span id="totalCashback" class="green">R$ 0,00</span>
            </div>
        </div>
    </div>
    <script>
        var COMPANY_ID = localStorage.getItem('lidel_company_id') || '428b07fc-0b10-481d-b32f-3d97c9d80ecd';
        var SUPABASE_URL = 'https://uqnxckjhmdkviouoivyy.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxbnhja2pobWRrdmlvdW9pdnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDk4NTAsImV4cCI6MjA5MzE4NTg1MH0.eXz3MU1PCxxQ5Yz0HzWIgqJhdyBAcQfT78rUDGdzVQc';
        var s = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        var vendasData = [];

        async function carregar() {
            var hoje = new Date();
            var trintaDiasAtras = new Date(hoje);
            trintaDiasAtras.setDate(hoje.getDate() - 30);
            document.getElementById('dataInicio').value = trintaDiasAtras.toISOString().split('T')[0];
            document.getElementById('dataFim').value = hoje.toISOString().split('T')[0];
            await filtrar();
        }

        async function filtrar() {
            var inicio = document.getElementById('dataInicio').value;
            var fim = document.getElementById('dataFim').value;
            var query = s.from('sales')
             .select('id, sale_date, total_amount, final_amount, cashback_generated, clients:client_id(name)')
             .eq('company_id', COMPANY_ID)
             .order('sale_date', { ascending: false });
            if (inicio) query = query.gte('sale_date', inicio);
            if (fim) query = query.lte('sale_date', fim + 'T23:59:59');
            var { data, error } = await query;
            if (error) { alert(error.message); return; }
            vendasData = data || [];
            var tbody = document.querySelector('#tabelaVendas tbody');
            if (vendasData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">Nenhuma venda no período.</td></tr>';
                document.getElementById('totalVendas').textContent = 'R$ 0,00';
                document.getElementById('totalCashback').textContent = 'R$ 0,00';
                return;
            }
            tbody.innerHTML = vendasData.map(function(v) {
                return `<tr>
                    <td>${new Date(v.sale_date).toLocaleString('pt-BR')}</td>
                    <td>${v.clients?.name || '-'}</td>
                    <td>R$${v.total_amount.toFixed(2)}</td>
                    <td>R$${v.final_amount.toFixed(2)}</td>
                    <td class="green">R$${(v.cashback_generated||0).toFixed(2)}</td>
                </tr>`;
            }).join('');
            var totalVendas = vendasData.reduce(function(acc, v) { return acc + v.total_amount; }, 0);
            var totalCashback = vendasData.reduce(function(acc, v) { return acc + (v.cashback_generated||0); }, 0);
            document.getElementById('totalVendas').textContent = 'R$ ' + totalVendas.toFixed(2);
            document.getElementById('totalCashback').textContent = 'R$ ' + totalCashback.toFixed(2);
        }

        function exportarCSV() {
            var csv = 'Data,Cliente,Valor Total,Valor Final,Cashback Gerado\n';
            vendasData.forEach(function(v) {
                csv += `${v.sale_date},"${v.clients?.name||''}",${v.total_amount},${v.final_amount},${v.cashback_generated||0}\n`;
            });
            var blob = new Blob([csv], { type: 'text/csv' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'vendas.csv';
            a.click();
        }

        carregar();
    </script>
</body>
</html>
