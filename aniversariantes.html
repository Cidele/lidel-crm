<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIDEL - Aniversariantes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; background: #f0f2f5; margin: 0; padding: 20px; }
        .navbar { background: #0055FF; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; margin: -20px -20px 20px -20px; }
        .navbar h1 { font-size: 20px; margin: 0; }
        .navbar a { color: white; text-decoration: none; margin-left: 15px; font-size: 14px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; }
        h2 { color: #0055FF; }
        .botoes { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .botao { padding: 8px 16px; border-radius: 20px; border: 1px solid #ddd; cursor: pointer; background: white; font-size: 13px; transition: 0.2s; }
        .botao.ativo { background: #0055FF; color: white; border-color: #0055FF; }
        .busca-livre { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #0055FF; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🎂 Aniversariantes</h1>
        <div>
            <a href="dashboard.html">Dashboard</a>
            <a href="vendas.html">💰 Vender</a>
            <a href="clientes.html">Clientes</a>
            <a href="aniversariantes.html">🎂 Aniversariantes</a>
        </div>
    </div>
    <div class="container">
        <h2>Aniversariantes</h2>
        <div class="botoes" id="botoesCategoria">
            <button class="botao ativo" onclick="mudarCategoria('clients', this)">Clientes</button>
            <button class="botao" onclick="mudarCategoria('partners', this)">Parceiros</button>
            <button class="botao" onclick="mudarCategoria('users', this)">Vendedores</button>
        </div>
        <div class="botoes" id="botoesPeriodo">
            <button class="botao ativo" onclick="mudarPeriodo('mes', this)">Este mês</button>
            <button class="botao" onclick="mudarPeriodo('hoje', this)">Hoje</button>
        </div>
        <input type="text" class="busca-livre" id="buscaNome" placeholder="🔍 Buscar por nome..." oninput="buscar()">
        <table>
            <thead><tr><th>Nome</th><th>Telefone</th><th>Email</th><th>Aniversário</th></tr></thead>
            <tbody id="resultados"><tr><td colspan="4">Carregando...</td></tr></tbody>
        </table>
    </div>
    <script>
        var COMPANY_ID = localStorage.getItem('lidel_company_id') || '428b07fc-0b10-481d-b32f-3d97c9d80ecd';
        var SUPABASE_URL = 'https://uqnxckjhmdkviouoivyy.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxbnhja2pobWRrdmlvdW9pdnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDk4NTAsImV4cCI6MjA5MzE4NTg1MH0.eXz3MU1PCxxQ5Yz0HzWIgqJhdyBAcQfT78rUDGdzVQc';
        var s = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Estado dos botões
        var categoria = 'clients';
        var periodo = 'mes';

        function mudarCategoria(nova, btn) {
            document.querySelectorAll('#botoesCategoria .botao').forEach(b => b.classList.remove('ativo'));
            btn.classList.add('ativo');
            categoria = nova;
            buscar();
        }

        function mudarPeriodo(novo, btn) {
            document.querySelectorAll('#botoesPeriodo .botao').forEach(b => b.classList.remove('ativo'));
            btn.classList.add('ativo');
            periodo = novo;
            buscar();
        }

        async function buscar() {
            var buscaNome = document.getElementById('buscaNome').value.trim().toLowerCase();
            var hoje = new Date();
            var diaAtual = hoje.getDate();
            var mesAtual = hoje.getMonth() + 1;

            var query = s.from(categoria)
                .select('name, phone, email, birthday_day, birthday_month')
                .eq('company_id', COMPANY_ID)
                .eq('birthday_month', mesAtual);

            if (periodo === 'hoje') {
                query = query.eq('birthday_day', diaAtual);
            }
            if (buscaNome) {
                query = query.ilike('name', '%' + buscaNome + '%');
            }

            var { data, error } = await query.order('birthday_day');
            var tbody = document.getElementById('resultados');
            if (error) {
                tbody.innerHTML = '<tr><td colspan="4">Erro: ' + error.message + '</td></tr>';
                return;
            }
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">Nenhum aniversariante encontrado.</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(function(p) {
                return '<tr><td>' + p.name + '</td><td>' + (p.phone||'-') + '</td><td>' + (p.email||'-') + '</td><td>' + p.birthday_day + '/' + p.birthday_month + '</td></tr>';
            }).join('');
        }

        buscar();
    </script>
</body>
</html>
