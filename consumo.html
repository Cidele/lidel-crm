<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIDEL - Histórico de Consumo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; background: #f0f2f5; margin: 0; padding: 20px; }
        .navbar { background: #0055FF; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; margin: -20px -20px 20px -20px; }
        .navbar h1 { font-size: 20px; margin: 0; }
        .navbar a { color: white; text-decoration: none; margin-left: 15px; font-size: 14px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; }
        h2 { color: #0055FF; }
        input, button { padding: 10px; border-radius: 8px; border: 1px solid #ddd; width: 100%; margin: 5px 0; box-sizing: border-box; }
        button { background: #0055FF; color: white; font-weight: bold; cursor: pointer; border: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #0055FF; color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .lembrete { background: #fef3c7; border-left: 4px solid #f59e0b; padding: 10px; border-radius: 5px; margin: 10px 0; }
        .resultado-busca { background: #f0fdf4; padding: 10px; border-radius: 8px; margin: 5px 0; cursor: pointer; border: 1px solid #bbf7d0; }
        .resultado-busca:hover { background: #dcfce7; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>📋 Histórico de Consumo</h1>
        <div>
            <a href="dashboard.html">Dashboard</a>
            <a href="vendas.html">💰 Vender</a>
            <a href="clientes.html">Clientes</a>
        </div>
    </div>
    <div class="container" id="conteudo">
        <h2>🔍 Buscar Cliente</h2>
        <input type="text" id="buscaClienteConsumo" placeholder="Digite o nome do cliente..." oninput="buscarClientes()">
        <div id="resultadosBusca"></div>
        <div id="historicoContainer" style="display:none;">
            <h3>📦 <span id="nomeClienteHistorico"></span></h3>
            <div style="background:#f9f9f9; padding:15px; border-radius:10px; margin-bottom:20px">
                <h3>Adicionar Consumo</h3>
                <input type="text" id="produto" placeholder="Produto/Alimento *">
                <input type="text" id="quantidade" placeholder="Quantidade (ex: 3 latas)">
                <input type="text" id="duracao" placeholder="Duração em dias (ex: 15)">
                <input type="date" id="dataConsumo">
                <button id="btnConsumo" onclick="adicionarConsumo()">Registrar</button>
            </div>
            <h3>Histórico</h3>
            <table>
                <thead><tr><th>Produto</th><th>Qtd</th><th>Data</th></tr></thead>
                <tbody id="tabelaHistorico"><tr><td colspan="3">Nenhum registro.</td></tr></tbody>
            </table>
        </div>
    </div>
    <script>
        var COMPANY_ID = localStorage.getItem('lidel_company_id') || '428b07fc-0b10-481d-b32f-3d97c9d80ecd';
        var SUPABASE_URL = 'https://uqnxckjhmdkviouoivyy.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxbnhja2pobWRrdmlvdW9pdnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDk4NTAsImV4cCI6MjA5MzE4NTg1MH0.eXz3MU1PCxxQ5Yz0HzWIgqJhdyBAcQfT78rUDGdzVQc';
        var s = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        var clienteSelecionado = null;

        async function buscarClientes() {
            var termo = document.getElementById('buscaClienteConsumo').value.trim();
            if (termo.length < 2) { document.getElementById('resultadosBusca').innerHTML = ''; return; }
            var resp = await s.from('clients').select('id, name, phone').eq('company_id', COMPANY_ID).ilike('name', '%' + termo + '%').limit(10);
            var html = '';
            if (resp.data) {
                resp.data.forEach(function(c) {
                    html += '<div class="resultado-busca" onclick="selecionarCliente(\'' + c.id + '\', \'' + c.name + '\')">' + c.name + ' (' + c.phone + ')</div>';
                });
            }
            document.getElementById('resultadosBusca').innerHTML = html || '<p style="color:#999;">Nenhum cliente encontrado.</p>';
        }

        async function selecionarCliente(id, nome) {
            clienteSelecionado = id;
            document.getElementById('nomeClienteHistorico').textContent = nome;
            document.getElementById('historicoContainer').style.display = 'block';
            document.getElementById('resultadosBusca').innerHTML = '';
            document.getElementById('buscaClienteConsumo').value = nome;
            await carregarHistorico();
        }

        async function carregarHistorico() {
            if (!clienteSelecionado) return;
            var resp = await s.from('consumption_history').select('*').eq('client_id', clienteSelecionado).order('consumed_at', { ascending: false });
            var html = '';
            if (resp.data && resp.data.length > 0) {
                resp.data.forEach(function(h) {
                    var lembreteHTML = '';
                    if (h.duration) {
                        var dias = parseInt(h.duration);
                        if (!isNaN(dias) && dias > 0) {
                            var dataConsumo = new Date(h.consumed_at);
                            var dataRecompra = new Date(dataConsumo);
                            dataRecompra.setDate(dataConsumo.getDate() + dias);
                            var hoje = new Date();
                            var diffDays = Math.ceil((dataRecompra - hoje) / (1000 * 60 * 60 * 24));
                            if (diffDays <= 7 && diffDays >= 0) {
                                lembreteHTML = '<div class="lembrete">🔔 Recomprar em ' + diffDays + ' dia(s)!</div>';
                            } else if (diffDays < 0) {
                                lembreteHTML = '<div class="lembrete" style="background:#fee2e2;border-color:#dc2626">⚠️ Recompra atrasada há ' + Math.abs(diffDays) + ' dias</div>';
                            }
                        }
                    }
                    html += '<tr><td>' + h.product_name + lembreteHTML + '</td><td>' + (h.quantity || '-') + '</td><td>' + new Date(h.consumed_at).toLocaleDateString('pt-BR') + '</td></tr>';
                });
            } else {
                html = '<tr><td colspan="3">Nenhum registro.</td></tr>';
            }
            document.getElementById('tabelaHistorico').innerHTML = html;
        }

        async function adicionarConsumo() {
            if (!clienteSelecionado) return alert('Selecione um cliente primeiro.');
            var produto = document.getElementById('produto').value.trim();
            var quantidade = document.getElementById('quantidade').value.trim();
            var duracao = document.getElementById('duracao').value.trim();
            var data = document.getElementById('dataConsumo').value;
            if (!produto || !data) return alert('Preencha produto e data.');
            var btn = document.getElementById('btnConsumo');
            btn.disabled = true; btn.textContent = 'Salvando…';
            await s.from('consumption_history').insert([{ client_id: clienteSelecionado, product_name: produto, quantity: quantidade || null, duration: duracao || null, consumed_at: data }]);
            btn.disabled = false; btn.textContent = 'Registrar';
            document.getElementById('produto').value = '';
            document.getElementById('quantidade').value = '';
            document.getElementById('duracao').value = '';
            carregarHistorico();
        }
    </script>
</body>
</html>
