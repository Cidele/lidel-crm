<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIDEL CRM - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 42px; color: #4f46e5; }
        .logo p { color: #6b7280; font-size: 14px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; }
        input {
            width: 100%; padding: 14px; margin-bottom: 15px;
            border: 2px solid #e5e7eb; border-radius: 12px;
            font-size: 16px; outline: none;
        }
        input:focus { border-color: #4f46e5; }
        button {
            width: 100%; padding: 14px;
            background: #4f46e5; color: white;
            border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; cursor: pointer;
        }
        button:hover { background: #4338ca; }
        .msg { margin-top: 15px; padding: 10px; border-radius: 8px; display: none; text-align: center; }
        .msg.success { background: #d1fae5; color: #065f46; display: block; }
        .msg.error { background: #fee2e2; color: #991b1b; display: block; }
        .msg.loading { background: #dbeafe; color: #1e40af; display: block; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo"><h1>🚀 LIDEL</h1><p>CRM & Pós-Venda Inteligente</p></div>
        <form id="loginForm">
            <label>📧 Email</label>
            <input type="email" id="email" placeholder="admin@lidel.com" required>
            <label>🔐 Senha</label>
            <input type="password" id="password" placeholder="••••••••" required>
            <button type="submit">Entrar no Sistema</button>
        </form>
        <div id="message" class="msg"></div>
    </div>
    <script>
        const SUPABASE_URL = 'https://uqnxckjhmdkviouoivyy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxbnhja2pobWRrdmlvdW9pdnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDk4NTAsImV4cCI6MjA5MzE4NTg1MH0.eXz3MU1PCxxQ5Yz0HzWIgqJhdyBAcQfT78rUDGdzVQc';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('message');
            msg.className = 'msg loading';
            msg.textContent = 'Autenticando...';
            const { data, error } = await supabase.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            });
            if (error) {
                msg.className = 'msg error';
                msg.textContent = '❌ ' + error.message;
            } else {
                msg.className = 'msg success';
                msg.textContent = '✅ Login realizado! Redirecionando...';
                localStorage.setItem('lidel_token', data.session.access_token);
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
            }
        });
    </script>
</body>
</html>
