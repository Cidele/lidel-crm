<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIDEL - Clientes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; background: #f0f2f5; margin: 0; padding: 20px; }
        .navbar { background: #0055FF; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; margin: -20px -20px 20px -20px; }
        .navbar h1 { font-size: 20px; margin: 0; }
        .navbar a { color: white; text-decoration: none; margin-left: 15px; font-size: 14px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; }
        h2 { color: #0055FF; }
        input, button { padding: 10px; border-radius: 8px; border: 1px solid #ddd; width: 100%; margin: 5px 0; box-sizing: border-box; }
        button { background: #0055FF; color: white; font-weight: bold; cursor: pointer; border: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #0055FF; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .msg { padding: 10px; border-radius: 5px; margin: 10px 0; display: none; }
        .msg.info { background: #dbeafe; color: #1e40af; display: block; }
        .msg.erro { background: #fee2e2; color: #991b1b; display: block; }
        .msg.sucesso { background: #d1fae5; color: #065f46; display: block; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>👥 Clientes</h1>
        <div>
            <a href="dashboard.html">Dashboard</a>
            <a href="vendas.html">💰 Vender</a>
            <a href="clientes.html">Clientes</a>
        </div>
    </div>
    <div class="container">
        <h2>Cadastro Rápido</h2>
        <input type="text" id="nome" placeholder="Nome *">
        <input type="tel" id="telefone" placeholder="Telefone *">
        <input type="email" id="email" placeholder="Email">
        <button id="btnSalvar" onclick="cadastrar()">💾 Salvar</button>
        <div id="msg" class="msg"></div>
        <h2 style="margin-top:30px;">Clientes Cadastrados</h2>
        <input type="text" id="busca" placeholder="🔍 Buscar por nome ou telefone..." oninput="filtrar()">
        <table>
            <thead><tr><th>Nome</th><th>Telefone</th><th>Email</th><th>Cashback</th></tr></thead>
            <tbody id="lista"></tbody>
        </table>
    </div>
    <script>
        var COMPANY_ID = localStorage.getItem('lidel_company_id') || '428b07fc-0b10-481d-b32f-3d97c9d80ecd';
        var SUPABASE_URL = 'https://uqnxckjhmdkviouoivyy.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxbnhja2pobWRrdmlvdW9pdnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDk4NTAsImV4cCI6MjA5MzE4NTg1MH0.eXz3MU1PCxxQ5Yz0HzWIgqJhdyBAcQfT78rUDGdzVQc';
        var s = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        var clientes = [];

        async function carregar() {
            var resp = await s.from('clients').select('*').eq('company_id', COMPANY_ID).order('name');
            clientes = resp.data || [];
            render(clientes);
        }

        function render(lista) {
            document.getElementById('lista').innerHTML = lista.map(function(c) {
                return '<tr><td>' + c.name + '</td><td>' + c.phone + '</td><td>' + (c.email || '-') + '</td><td style="color:green">R$' + (c.cashback_balance || 0).toFixed(2) + '</td></tr>';
            }).join('');
        }

        function filtrar() {
            var termo = document.getElementById('busca').value.toLowerCase();
            var filtrados = clientes.filter(function(c) {
                return c.name.toLowerCase().includes(termo) || c.phone.includes(termo);
            });
            render(filtrados);
        }

        async function cadastrar() {
            var nome = document.getElementById('nome').value.trim();
            var fone = document.getElementById('telefone').value.trim();
            if (!nome || !fone) {
                document.getElementById('msg').className = 'msg erro';
                document.getElementById('msg').textContent = 'Nome e telefone obrigatórios.';
                return;
            }
            var btn = document.getElementById('btnSalvar');
            btn.disabled = true; btn.textContent = 'Salvando...';
            var resp = await s.from('clients').insert([{ company_id: COMPANY_ID, name: nome, phone: fone, email: document.getElementById('email').value.trim() || null }]);
            btn.disabled = false; btn.textContent = '💾 Salvar';
            if (resp.error) {
                document.getElementById('msg').className = 'msg erro';
                document.getElementById('msg').textContent = 'Erro: ' + resp.error.message;
            } else {
                document.getElementById('msg').className = 'msg sucesso';
                document.getElementById('msg').textContent = 'Cliente cadastrado!';
                document.getElementById('nome').value = '';
                document.getElementById('telefone').value = '';
                document.getElementById('email').value = '';
                carregar();
            }
        }

        carregar();
    </script>
</body>
</html>
