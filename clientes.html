<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIDEL - Clientes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; background: #f0f2f5; margin: 0; padding: 20px; }
        .navbar { background: #0055FF; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; margin: -20px -20px 20px -20px; }
        .navbar h1 { font-size: 20px; margin: 0; }
        .navbar a { color: white; text-decoration: none; margin-left: 15px; font-size: 14px; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; }
        h2 { color: #0055FF; }
        input, button { padding: 10px; border-radius: 8px; border: 1px solid #ddd; width: 100%; margin: 5px 0; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .row input { flex: 1; }
        button { background: #0055FF; color: white; font-weight: bold; cursor: pointer; border: none; }
        .btn-excluir { background: #dc2626; }
        .btn-editar { background: #f59e0b; color: white; margin-right:5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #0055FF; color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .msg { padding: 10px; border-radius: 5px; margin: 10px 0; display: none; }
        .msg.info { background: #dbeafe; color: #1e40af; display: block; }
        .msg.erro { background: #fee2e2; color: #991b1b; display: block; }
        .msg.sucesso { background: #d1fae5; color: #065f46; display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
        .clickable { cursor: pointer; color: #0055FF; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>👥 Clientes</h1>
        <div>
            <a href="dashboard.html">Dashboard</a>
            <a href="vendas.html">💰 Vender</a>
            <a href="clientes.html">Clientes</a>
            <a href="aniversariantes.html">🎂 Aniversariantes</a>
        </div>
    </div>
    <div class="container">
        <h2>Cadastro Rápido</h2>
        <input type="text" id="nome" placeholder="Nome *">
        <input type="tel" id="telefone" placeholder="Telefone *">
        <input type="email" id="email" placeholder="Email">
        <div class="row">
            <input type="number" id="dia" placeholder="Dia" min="1" max="31">
            <input type="number" id="mes" placeholder="Mês" min="1" max="12">
        </div>
        <button id="btnSalvar" onclick="cadastrar()">💾 Salvar</button>
        <div id="msg" class="msg"></div>
        <h2>Clientes Cadastrados</h2>
        <input type="text" id="busca" placeholder="🔍 Buscar..." oninput="filtrar()">
        <table>
            <thead><tr><th>Nome</th><th>Telefone</th><th>Email</th><th>Aniversário</th><th>Cashback</th><th>Ações</th></tr></thead>
            <tbody id="lista"></tbody>
        </table>
    </div>

    <!-- Modal de Histórico ao clicar no nome -->
    <div class="modal" id="modalHistorico">
        <div class="modal-content">
            <h2>Histórico do Cliente</h2>
            <div id="historicoConteudo"></div>
            <button onclick="fecharModalHistorico()" style="background:#ccc;margin-top:15px;">Fechar</button>
        </div>
    </div>

    <!-- Modal de Edição -->
    <div class="modal" id="modalEdicao">
        <div class="modal-content">
            <h2>Editar Cliente</h2>
            <input type="hidden" id="editId">
            <input type="text" id="editNome" placeholder="Nome">
            <input type="tel" id="editTelefone" placeholder="Telefone">
            <input type="email" id="editEmail" placeholder="Email">
            <div class="row">
                <input type="number" id="editDia" placeholder="Dia" min="1" max="31">
                <input type="number" id="editMes" placeholder="Mês" min="1" max="12">
            </div>
            <button onclick="salvarEdicao()">💾 Salvar</button>
            <button onclick="fecharModalEdicao()" style="background:#ccc;margin-top:5px;">Cancelar</button>
        </div>
    </div>

    <script>
        var COMPANY_ID = localStorage.getItem('lidel_company_id') || '428b07fc-0b10-481d-b32f-3d97c9d80ecd';
        var SUPABASE_URL = 'https://uqnxckjhmdkviouoivyy.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxbnhja2pobWRrdmlvdW9pdnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDk4NTAsImV4cCI6MjA5MzE4NTg1MH0.eXz3MU1PCxxQ5Yz0HzWIgqJhdyBAcQfT78rUDGdzVQc';
        var s = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        var clientes = [];

        async function carregar() {
            var resp = await s.from('clients').select('*').eq('company_id', COMPANY_ID).order('name');
            clientes = resp.data || [];
            render(clientes);
        }

        function render(lista) {
            document.getElementById('lista').innerHTML = lista.map(function(c) {
                var aniv = (c.birthday_day && c.birthday_month) ? c.birthday_day + '/' + c.birthday_month : '-';
                return `<tr>
                    <td class="clickable" onclick="verHistorico('${c.id}')">${c.name}</td>
                    <td>${c.phone}</td>
                    <td>${c.email||'-'}</td>
                    <td>${aniv}</td>
                    <td style="color:green">R$${(c.cashback_balance||0).toFixed(2)}</td>
                    <td>
                        <button class="btn-editar" onclick="editar('${c.id}')">✏️</button>
                        <button class="btn-excluir" onclick="excluir('${c.id}')">🗑️</button>
                    </td></tr>`;
            }).join('');
        }

        function filtrar() {
            var termo = document.getElementById('busca').value.toLowerCase();
            render(clientes.filter(function(c) { return c.name.toLowerCase().includes(termo) || c.phone.includes(termo); }));
        }

        async function cadastrar() {
            var nome = document.getElementById('nome').value.trim();
            var fone = document.getElementById('telefone').value.trim();
            var dia = parseInt(document.getElementById('dia').value) || null;
            var mes = parseInt(document.getElementById('mes').value) || null;
            if (!nome || !fone) { mostrarMsg('msg', 'Nome e telefone obrigatórios.', 'erro'); return; }

            // Verificar duplicidade
            var existente = clientes.find(function(c) { return c.phone === fone; });
            if (existente) {
                if (!confirm('Já existe um cliente com este telefone (' + existente.name + '). Deseja cadastrar mesmo assim?')) return;
            }

            var btn = document.getElementById('btnSalvar'); btn.disabled = true; btn.textContent = 'Salvando...';
            var resp = await s.from('clients').insert([{ company_id: COMPANY_ID, name: nome, phone: fone, email: document.getElementById('email').value.trim() || null, birthday_day: dia, birthday_month: mes }]);
            btn.disabled = false; btn.textContent = '💾 Salvar';
            if (resp.error) mostrarMsg('msg', resp.error.message, 'erro');
            else { mostrarMsg('msg', 'Cliente cadastrado!', 'sucesso'); limparForm(); carregar(); }
        }

        // Histórico ao clicar no nome
        async function verHistorico(id) {
            var c = clientes.find(function(x) { return x.id === id; });
            if (!c) return;

            // Buscar consumo (últimos 3 meses)
            var tresMesesAtras = new Date(); tresMesesAtras.setMonth(tresMesesAtras.getMonth() - 3);
            var respConsumo = await s.from('consumption_history').select('*').eq('client_id', id).gte('consumed_at', tresMesesAtras.toISOString().split('T')[0]).order('consumed_at', { ascending: false });

            // Buscar vendas (últimos 3 meses)
            var respVendas = await s.from('sales').select('sale_date, total_amount, final_amount, cashback_generated').eq('client_id', id).gte('sale_date', tresMesesAtras.toISOString().split('T')[0]).order('sale_date', { ascending: false });
editId').value = c.id;
            document.getElementById('editNome').value = c.name;
            document.getElementById('editTelefone').value = c.phone;
            document.getElementById('editEmail').value = c.email || '';
            document.getElementById('editDia').value = c.birthday_day || '';
            document.getElementById('editMes').value = c.birthday_month || '';
            document.getElementById('modalEdicao').classList.add('active');
            var html = `<h3>${c.name}</h3>
                <p><strong>Cashback disponível:</strong> R$${(c.cashback_balance||0).toFixed(2)}</p>
                <h4>📋 Consumo (últimos 3 meses)</h4>`;
            if (respConsumo.data && respConsumo.data.length > 0) {
                html += '<table><tr><th>Produto</th><th>Qtd</th><th>Data</th></tr>';
                respConsumo.data.forEach(function(h) {
                    html += `<tr><td>${h.product_name}</td><td>${h.quantity||'-'}</td><td>${new Date(h.consumed_at).toLocaleDateString('pt-BR')}</td></tr>`;
                });
                html += '</table>';
            } else html += '<p>Nenhum consumo recente.</p>';

            html += '<h4>💰 Vendas (últimos 3 meses)</h4>';
            if (respVendas.data && respVendas.data.length > 0) {
                html += '<table><tr><th>Data</th><th>Valor Total</th><th>Valor Pago</th><th>Cashback</th></tr>';
                respVendas.data.forEach(function(v) {
                    html += `<tr><td>${new Date(v.sale_date).toLocaleDateString('pt-BR')}</td><td>R$${v.total_amount.toFixed(2)}</td><td>R$${v.final_amount.toFixed(2)}</td><td>R$${(v.cashback_generated||0).toFixed(2)}</td></tr>`;
                });
                html += '</table>';
            } else html += '<p>Nenhuma venda recente.</p>';

            document.getElementById('historicoConteudo').innerHTML = html;
            document.getElementById('modalHistorico').classList.add('active');
        }

        function fecharModalHistorico() { document.getElementById('modalHistorico').classList.remove('active'); }

        // Editar
        function editar(id) {
            var c = clientes.find(function(x) { return x.id === id; });
            if (!c) return;
            document.getElementById('
        }

        function fecharModalEdicao() { document.getElementById('modalEdicao').classList.remove('active'); }

        async function salvarEdicao() {
            var id = document.getElementById('editId').value;
            var nome = document.getElementById('editNome').value.trim();
            var fone = document.getElementById('editTelefone').value.trim();
            var dia = parseInt(document.getElementById('editDia').value) || null;
            var mes = parseInt(document.getElementById('editMes').value) || null;
            if (!nome || !fone) { alert('Nome e telefone obrigatórios.'); return; }
            var resp = await s.from('clients').update({ name: nome, phone: fone, email: document.getElementById('editEmail').value.trim() || null, birthday_day: dia, birthday_month: mes }).eq('id', id);
            if (resp.error) alert(resp.error.message);
            else { fecharModalEdicao(); carregar(); mostrarMsg('msg', 'Atualizado!', 'sucesso'); }
        }

        async function excluir(id) {
            if (!confirm('Excluir este cliente? Essa ação não pode ser desfeita.')) return;
            var resp = await s.from('clients').delete().eq('id', id);
            if (resp.error) alert(resp.error.message);
            else { carregar(); mostrarMsg('msg', 'Excluído!', 'sucesso'); }
        }

        function mostrarMsg(id, texto, tipo) { var m = document.getElementById(id); m.className = 'msg ' + tipo; m.textContent = texto; }
        function limparForm() { ['nome','telefone','email','dia','mes'].forEach(function(id) { document.getElementById(id).value = ''; }); }

        carregar();
    </script>
</body>
</html>
