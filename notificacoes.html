<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIDEL - Notificações</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; background: #f0f2f5; margin: 0; padding: 20px; }
        .navbar { background: #4f46e5; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; margin: -20px -20px 20px -20px; }
        .navbar h1 { font-size: 22px; }
        .navbar a { color: white; text-decoration: none; margin-left: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; }
        h2 { color: #4f46e5; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #4f46e5; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-info { background: #dbeafe; color: #1e40af; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🔔 Notificações</h1>
        <div>
            <a href="dashboard.html">Dashboard</a>
            <a href="clientes.html">Clientes</a>
            <a href="vendas.html">Vendas</a>
            <a href="parceiros.html">Parceiros</a>
            <a href="vendedores.html">Vendedores</a>
            <a href="campanhas.html">Campanhas</a>
            <a href="relatorios.html">Relatórios</a>
            <a href="sac.html">SAC</a>
            <a href="indicacao.html">Indicação</a>
            <a href="consumo.html">Consumo</a>
            <a href="notificacoes.html">Notificações</a>
            <a href="saude.html">Saúde</a>
            <a href="assinaturas.html">Assinaturas</a>
        </div>
    </div>
    <div class="container">
        <h2>Notificações Recentes</h2>
        <table id="tabelaNotificacoes">
            <thead><tr><th>Data</th><th>Tipo</th><th>Mensagem</th><th>Status</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <script>
        const COMPANY_ID = 'ab52ae79-063b-4e9d-9e19-295ffdf2f8ae';
        const SUPABASE_URL = 'https://uqnxckjhmdkviouoivyy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxbnhja2pobWRrdmlvdW9pdnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDk4NTAsImV4cCI6MjA5MzE4NTg1MH0.eXz3MU1PCxxQ5Yz0HzWIgqJhdyBAcQfT78rUDGdzVQc';
        const s = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        async function carregar(){
            const {data} = await s.from('notifications').select('*').eq('company_id', COMPANY_ID).order('created_at', {ascending: false}).limit(50);
            const tb = document.getElementById('tabelaNotificacoes').querySelector('tbody');
            if (data && data.length) {
                tb.innerHTML = data.map(n => `
                    <tr>
                        <td>${new Date(n.created_at).toLocaleString('pt-BR')}</td>
                        <td>${n.recipient_type}</td>
                        <td>${n.content?.message || '-'}</td>
                        <td><span class="badge ${n.status === 'pending' ? 'badge-warning' : 'badge-info'}">${n.status}</span></td>
                    </tr>
                `).join('');
            } else {
                tb.innerHTML = '<tr><td colspan="4">Nenhuma notificação ainda.</td></tr>';
            }
        }
        carregar();
    </script>
</body>
</html>
