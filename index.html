<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIDEL CRM - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #4f46e5; font-size: 36px; }
        .logo p { color: #666; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .msg { margin-top: 15px; padding: 10px; border-radius: 8px; text-align: center; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <h1>LIDEL</h1>
            <p>CRM e Pos-Venda Inteligente</p>
        </div>
        
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar</button>
        
        <div id="msg" class="msg"></div>
    </div>

    <script>
        var SUPABASE_URL = 'https://uqnxckjhmdkviouoivyy.supabase.co'
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxbnhja2pobWRrdmlvdW9pdnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDk4NTAsImV4cCI6MjA5MzE4NTg1MH0.eXz3MU1PCxxQ5Yz0HzWIgqJhdyBAcQfT78rUDGdzVQc'
        var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

        async function fazerLogin() {
            var msg = document.getElementById('msg')
            var email = document.getElementById('email').value
            var password = document.getElementById('password').value

            msg.style.display = 'block'
            msg.style.background = '#dbeafe'
            msg.style.color = '#1e40af'
            msg.textContent = 'Autenticando...'

            // 1. Autenticar
            var response = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            })

            if (response.error) {
                msg.style.background = '#fee2e2'
                msg.style.color = '#991b1b'
                msg.textContent = 'Erro: ' + response.error.message
                return
            }

            if (response.data && response.data.user) {
                // 2. Buscar perfil
                var userResponse = await supabase
                    .from('users')
                    .select('company_id, role')
                    .eq('email', email)
                    .single()

                // 3. SE NÃO ENCONTRAR, CRIAR O PERFIL AUTOMATICAMENTE
                if (!userResponse.data) {
                    var empresaResponse = await supabase
                        .from('companies')
                        .select('id')
                        .limit(1)
                        .single()
                    
                    if (empresaResponse.data) {
                        await supabase.from('users').insert({
                            company_id: empresaResponse.data.id,
                            name: email.split('@')[0],
                            email: email,
                            role: 'admin'
                        })
                        
                        userResponse = await supabase
                            .from('users')
                            .select('company_id, role')
                            .eq('email', email)
                            .single()
                    }
                }

                if (userResponse.data) {
                    localStorage.setItem('lidel_token', response.data.session.access_token)
                    localStorage.setItem('lidel_company_id', userResponse.data.company_id)
                    localStorage.setItem('lidel_role', userResponse.data.role)

                    msg.style.background = '#d1fae5'
                    msg.style.color = '#065f46'
                    msg.textContent = 'Login realizado! Redirecionando...'

                    setTimeout(function() {
                        if (userResponse.data.role === 'admin') {
                             window.location.replace('admin.html');
                        } else {
                            window.location.replace('dashboard.html');
                        }
                    }, 1000)
                }
            }
        }
    </script>
</body>
</html>
