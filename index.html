<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIDEL CRM - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2?v=20260510"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0033CC, #0055FF);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #0033CC; font-size: 28px; }
        .logo p { color: #666; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0033CC;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #001F7F; }
        .msg {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .msg.error { background: #fee2e2; color: #991b1b; display: block; }
        .msg.success { background: #d1fae5; color: #065f46; display: block; }
        .msg.loading { background: #dbeafe; color: #1e40af; display: block; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <h1>LIDEL</h1>
            <p>CRM & Pós-Venda Inteligente</p>
        </div>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
        <div id="message" class="msg"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://uqnxckjhmdkviouoivyy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxbnhja2pobWRrdmlvdW9pdnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDk4NTAsImV4cCI6MjA5MzE4NTg1MH0.eXz3MU1PCxxQ5Yz0HzWIgqJhdyBAcQfT78rUDGdzVQc';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fazerLogin(email, password) {
            var msg = document.getElementById('message');
            msg.className = 'msg loading';
            msg.textContent = 'Autenticando...';

            var response = await supabase.auth.signInWithPassword({ email: email, password: password });

            if (response.error) {
                msg.className = 'msg error';
                msg.textContent = 'Erro: ' + response.error.message;
                return;
            }

            var userResponse = await supabase
                .from('users')
                .select('company_id, role')
                .eq('email', email)
                .single();

            if (!userResponse.data) {
                msg.className = 'msg error';
                msg.textContent = 'Usuário não encontrado na base.';
                return;
            }

            localStorage.setItem('lidel_token', response.data.session.access_token);
            localStorage.setItem('lidel_company_id', userResponse.data.company_id);
            localStorage.setItem('lidel_role', userResponse.data.role);

            msg.className = 'msg success';
            msg.textContent = 'Login realizado! Redirecionando...';

            setTimeout(function() {
                if (userResponse.data.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            }, 1000);
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            fazerLogin(email, password);
        });
    </script>
</body>
</html>
